<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0c14">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>デッキ | MTGデッキ開発室</title>
<link rel="stylesheet" href="css/common.css">
</head>
<body>
<div class="app" id="app">
  <a class="home-link" href="index.html">‹ デッキ選択へ戻る</a>
  <div id="loading" class="panel" style="padding:20px;border-radius:18px">デッキを読み込んでいます…</div>
  <div id="error" class="error" hidden></div>

  <div id="deckView" hidden>
    <section class="hero">
      <div class="kicker" id="deckKicker">📚 MTGデッキ開発室</div>
      <h1 id="deckTitle"></h1>
      <div class="sub" id="deckMeta"></div>
      <div class="sub" id="deckSummary"></div>
      <div class="sub ver">Ver.4.0・JSON共通デッキページ</div>
      <div class="progressrow"><span>購入進捗</span><strong id="progressText">0 / 0</strong></div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="legend"><span>🔥 最優先</span><span>⭐ 通常</span><span>○ 後回し</span></div>
    </section>

    <nav class="mode-switch" aria-label="デッキページのモード切替">
      <button class="mode-tab" type="button" data-mode="growth">🌱 育成モード</button>
      <button class="mode-tab" type="button" data-mode="shop">🛒 ショップモード</button>
    </nav>

    <section class="mode-panel" data-panel="growth">
      <section class="kanade-guide" aria-live="polite">
        <div class="kanade-guide-inner">
          <img id="deckKanadeImageGrowth" src="kanade_success.png" alt="宙星かなで">
          <div>
            <div class="kanade-guide-name">💜 宙星かなで</div>
            <div class="kanade-bubble" id="deckKanadeMessageGrowth"></div>
          </div>
        </div>
      </section>
      <div class="growth-grid" id="growthOverview"></div>
      <article class="growth-card wide">
        <div class="growth-label">今日のチェック</div>
        <div class="check-grid" id="growthChecks"></div>
      </article>
      <article class="growth-card wide">
        <div class="growth-label">デッキメモ</div>
        <textarea class="growth-memo" id="growthMemo"></textarea>
        <button class="growth-save" id="saveGrowthMemo" type="button">メモを保存</button>
        <div class="growth-saved" id="growthSaved"></div>
      </article>
    </section>

    <section class="mode-panel" data-panel="shop">
      <section class="kanade-guide" aria-live="polite">
        <div class="kanade-guide-inner">
          <img id="deckKanadeImageShop" src="kanade_shopping.png" alt="宙星かなで">
          <div>
            <div class="kanade-guide-name">💜 宙星かなで</div>
            <div class="kanade-bubble" id="deckKanadeMessageShop"></div>
          </div>
        </div>
      </section>

      <div class="tools">
        <button class="action primary" id="copyDeck" type="button">📋 デッキリストをコピー</button>
        <button class="action" id="randomLine" type="button">✨ かなでのひとこと</button>
      </div>
      <input class="search" id="search" type="search" placeholder="日本語名・英語名で検索">
      <main id="deckSections"></main>
    </section>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/deck.js" defer></script>
</body>
</html>
