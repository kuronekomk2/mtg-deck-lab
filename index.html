<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0c14">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/common.css">
<title>MTGデッキ開発室</title>
</head>
<body>
<div class="app home-app">
  <header class="home-header">
    <div class="home-brand">
      <div class="home-brand-copy">
        <div class="kicker">💜 宙星かなで</div>
        <h1 id="appTitle">MTGデッキ開発室</h1>
        <p class="sub home-lead">デッキを選んで、購入と育成を続けよう。</p>
        <div class="sub ver" id="appVersion">Ver.4.0</div>
      </div>
      <img class="home-kanade" src="kanade_normal.png" alt="宙星かなで">
    </div>
  </header>

  <section class="home-section">
    <div class="home-section-heading">
      <div>
        <div class="home-section-kicker">DECK LIBRARY</div>
        <h2>デッキを選ぶ</h2>
      </div>
      <span class="deck-count" id="deckCount">0 decks</span>
    </div>

    <div id="loading" class="panel home-loading">デッキ一覧を読み込んでいます…</div>
    <div id="error" class="error" hidden></div>
    <main class="deck-grid" id="deckGrid" hidden></main>
  </section>

  <footer class="home-footer">
    <span>宙星かなでのMTGマネージャー</span>
    <span>JSON Common Architecture</span>
  </footer>
</div>

<script src="js/app.js" defer></script>
</body>
</html>
