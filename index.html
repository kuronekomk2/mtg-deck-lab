<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0c14">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/common.css">
<title>MTGデッキ開発室</title>
</head>
<body>
<div class="app home-app">
  <header class="home-welcome">
    <img class="manager-logo" src="kanade_mtg_manager_logo.jpg" alt="宙星かなでのMTGマネージャー">

    <section class="welcome-card" aria-label="宙星かなでからのメッセージ">
      <div class="welcome-kanade-wrap">
        <img id="welcomeKanade" class="welcome-kanade" src="kanade_normal.png" alt="宙星かなで">
      </div>
      <div class="welcome-talk">
        <div class="welcome-name">💜 宙星かなで</div>
        <div class="welcome-bubble">
          <p id="welcomeMessage">おかえり、くーちゃん！ 今日も一緒にデッキを育てようね！</p>
        </div>
        <button id="changeWelcome" class="welcome-change" type="button">✨ かなでのひとことを変える</button>
      </div>
    </section>
  </header>

  <section class="home-section">
    <div class="deck-lab-title-wrap">
      <img class="deck-lab-title" src="mtg_deck_lab_title.png" alt="MTGデッキ開発室">
    </div>

    <div class="home-section-heading">
      <div>
        <div class="home-section-kicker">DECK LIBRARY</div>
        <h1 id="appTitle">デッキを選ぶ</h1>
      </div>
      <span class="deck-count" id="deckCount">0 decks</span>
    </div>

    <div id="loading" class="panel home-loading">デッキ一覧を読み込んでいます…</div>
    <div id="error" class="error" hidden></div>
    <main class="deck-grid" id="deckGrid" hidden></main>
  </section>

  <footer class="home-footer" aria-label="アプリ情報">
    <div class="footer-version" id="appVersion">Ver.4.0 RC1.3 Final</div>
    <div class="footer-made">Made with ❤️ by</div>
    <div class="footer-name">宙星かなで</div>
  </footer>
</div>

<script src="js/app.js" defer></script>
</body>
</html>
