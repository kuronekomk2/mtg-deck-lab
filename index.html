<title>📚 MTGデッキ開発室</title>
<style>
:root{--bg:#0f0c14;--panel:#1d1726;--panel2:#251d30;--line:#443650;--text:#faf7fc;--muted:#bdb1c6;--accent:#c59cff;--ok:#8ce3b3}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif}
.app{max-width:760px;margin:auto;padding:16px 14px 100px}
.hero{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
.kicker{color:var(--accent);font-weight:800} h1{font-size:25px;margin:8px 0 4px} .sub{color:var(--muted);font-size:14px} .ver{font-size:11px;margin-top:5px}
.progressrow{display:flex;justify-content:space-between;margin-top:18px;font-weight:700} .bar{height:10px;border:1px solid var(--line);border-radius:999px;margin-top:8px;overflow:hidden;background:#0d0911} .fill{height:100%;width:0;background:linear-gradient(90deg,#8e5bc3,#d35e9e)}
.legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0} button{font:inherit}
.action{min-height:52px;border-radius:16px;border:1px solid var(--line);color:var(--text);font-weight:800;background:var(--panel2);font-size:15px}
.action.primary{background:linear-gradient(135deg,#8755b5,#b94e8e)}
h2{font-size:16px;color:var(--muted);margin:22px 4px 12px}
.list{display:flex;flex-direction:column;gap:9px}
.card{display:grid;grid-template-columns:42px 48px 1fr;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:10px}
.check{appearance:none;-webkit-appearance:none;width:28px;height:28px;border:2px solid #82718e;border-radius:9px;background:#100c15;margin:auto}
.check:checked{background:var(--ok);border-color:var(--ok)} .check:checked:after{content:"✓";display:block;text-align:center;color:#122017;font-size:19px;font-weight:900}
.priority{width:42px;height:38px;border-radius:11px;border:1px solid var(--line);background:#100c15;color:white;font-size:20px}
.names{min-width:0} .jp{display:block;font-size:15px;font-weight:800;line-height:1.3} .en{display:block;font-size:12px;color:var(--muted);margin-top:3px;overflow-wrap:anywhere}
.card.done{opacity:.56} .card.done .jp{text-decoration:line-through}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:white;color:#24172d;padding:11px 16px;border-radius:999px;font-weight:800;display:none;z-index:5}
.fallback{font-size:12px;color:var(--muted);margin:12px 2px}
@media(max-width:520px){.actions{grid-template-columns:1fr}}
</style>
</head>

<h1>🎭 黄泉還りの輪舞</h1>
<div class="sub">統率者：虐殺少女 / Massacre Girl</div>
<div class="sub ver">Ver.2.2・静的100枚表示版</div>
<div class="progressrow"><span>購入進捗</span><strong id="progressText">0 / 100</strong></div>
<div class="bar"><div class="fill" id="fill"></div></div>
<div class="legend"><span>🔥 最優先</span><span>⭐ 通常</span><span>○ 後回し</span></div>
</section>
<div class="actions">

<button class="action" id="copyMissing" type="button">🛒 未購入だけコピー</button>
</div>
<div class="fallback">カード一覧はJavaScriptが動かない表示環境でも、そのまま表示される設計に変更済み。</div>

<script>
(function(){
"use strict";
var KEY="yomigaeri_v22_state";
var cards=document.getElementsByClassName("card");
var icons=["🔥","⭐","○"];

function safeLoad(){
  try{return JSON.parse(window.localStorage.getItem(KEY)||"{}");}catch(e){return {};}
}
function safeSave(data){
  try{window.localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}
}
var state=safeLoad();

function update(){
  var bought=0,total=0,i,card,check,priority;
  for(i=0;i<cards.length;i++){
    card=cards[i]; check=card.getElementsByClassName("check")[0]; priority=card.getElementsByClassName("priority")[0];
    total+=parseInt(card.getAttribute("data-qty"),10)||1;
    if(state[i]){
      check.checked=!!state[i].done;
      priority.setAttribute("data-priority",String(state[i].priority==null?parseInt(priority.getAttribute("data-priority"),10):state[i].priority));
    }
    priority.textContent=icons[parseInt(priority.getAttribute("data-priority"),10)||0];
    if(check.checked){bought+=parseInt(card.getAttribute("data-qty"),10)||1;card.className="card done";}
    else{card.className="card";}
  }
  document.getElementById("progressText").textContent=bought+" / "+total;
  document.getElementById("fill").style.width=(total?Math.round(bought*100/total):0)+"%";
}

function remember(index){
  var card=cards[index],check=card.getElementsByClassName("check")[0],priority=card.getElementsByClassName("priority")[0];
  state[index]={done:check.checked,priority:parseInt(priority.getAttribute("data-priority"),10)||0};
  safeSave(state); update();
}

function showToast(message){
  var t=document.getElementById("toast");t.textContent=message;t.style.display="block";
  window.setTimeout(function(){t.style.display="none";},1600);
}

function copyText(text,message){
  var b=document.getElementById("copyBuffer");b.value=text;b.focus();b.select();
  try{document.execCommand("copy");showToast(message);}
  catch(e){window.prompt("このテキストをコピーしてください",text);}
}

function makeMissing(){
  var out=[],i,card,check;
  for(i=0;i<cards.length;i++){
    card=cards[i];check=card.getElementsByClassName("check")[0];
    if(!check.checked)out.push(card.getAttribute("data-qty")+" "+card.getAttribute("data-en"));
  }
  return out.join("\n");
}

for(var i=0;i<cards.length;i++){
  (function(index){
    var check=cards[index].getElementsByClassName("check")[0];
    var priority=cards[index].getElementsByClassName("priority")[0];
    check.addEventListener("change",function(){remember(index);},false);
    priority.addEventListener("click",function(){
      var p=(parseInt(priority.getAttribute("data-priority"),10)+1)%3;
      priority.setAttribute("data-priority",String(p));remember(index);
    },false);
  })(i);
}

document.getElementById("copyMissing").addEventListener("click",function(){
  var text=makeMissing();if(text)copyText(text,"未購入カードをコピーしました");else showToast("未購入カードはありません");
},false);
update();
})();
