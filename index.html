<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#100d16">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="MTGデッキ開発室">
<title>📚 MTGデッキ開発室</title>
<style>
:root{
  --bg:#0f0c14;--panel:#1d1726;--panel2:#251d30;--line:#443650;
  --text:#faf7fc;--muted:#bdb1c6;--accent:#c59cff;--pink:#ff8fc7;
}
*{box-sizing:border-box}
body{
  margin:0;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
  background:
    radial-gradient(circle at 15% 0%,rgba(197,156,255,.16),transparent 32%),
    radial-gradient(circle at 95% 22%,rgba(255,143,199,.11),transparent 28%),
    var(--bg);
}
.app{max-width:820px;margin:auto;padding:18px 14px 90px}
.hero{
  border:1px solid var(--line);border-radius:24px;padding:22px 20px;
  background:linear-gradient(145deg,rgba(37,29,48,.98),rgba(25,20,33,.98));
  box-shadow:0 16px 38px rgba(0,0,0,.28);
}
.kicker{font-size:13px;color:var(--accent);font-weight:850;letter-spacing:.07em}
h1{font-size:28px;margin:7px 0 6px}
.hero p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
.version{display:inline-block;margin-top:14px;padding:6px 10px;border:1px solid var(--line);
  border-radius:999px;color:var(--accent);font-size:12px;font-weight:800}
.section-title{font-size:15px;color:var(--muted);font-weight:850;margin:22px 4px 11px}
.decks{display:grid;gap:12px}
.deck{
  display:grid;grid-template-columns:58px 1fr auto;gap:13px;align-items:center;
  padding:16px;border:1px solid var(--line);border-radius:19px;
  background:rgba(29,23,38,.96);color:var(--text);text-decoration:none;
  box-shadow:0 8px 20px rgba(0,0,0,.15);transition:.18s ease;
}
.deck:active{transform:scale(.985)}
.deck.available:hover{border-color:#8466a0;transform:translateY(-1px)}
.symbol{width:54px;height:54px;display:grid;place-items:center;border-radius:16px;
  font-size:27px;background:#120e18;border:1px solid var(--line)}
.deck h2{font-size:18px;margin:0 0 4px}
.deck p{font-size:12px;line-height:1.55;margin:0;color:var(--muted)}
.arrow{font-size:23px;color:var(--accent)}
.badge{display:inline-block;margin-top:7px;font-size:11px;font-weight:800;padding:4px 8px;
  border-radius:999px;background:#30243e;color:#d9bdff}
.deck.disabled{opacity:.62;cursor:default}
.deck.disabled .badge{color:#d8cedf;background:#29232f}
.kanade{
  margin-top:22px;display:grid;grid-template-columns:82px 1fr;gap:15px;align-items:center;
  padding:16px;border:1px solid #5b4168;border-radius:22px;
  background:linear-gradient(135deg,rgba(92,56,112,.38),rgba(116,48,91,.25));
}
.kanade img{width:82px;height:82px;object-fit:cover;border-radius:50%;
  border:2px solid #d0a6ff;background:#17111d}
.kanade-name{font-weight:900;color:#e2c9ff;margin-bottom:4px}
.kanade-message{font-size:15px;font-weight:750;line-height:1.6}
.footer{text-align:center;color:#756b7e;font-size:11px;margin-top:24px}
@media(min-width:700px){
  .decks{grid-template-columns:1fr 1fr}
  .deck:first-child{grid-column:1/-1}
}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="kicker">📚 KŪ-CHAN'S MTG TOOL</div>
    <h1>MTGデッキ開発室</h1>
    <p>デッキは完成させるものじゃない。<br>実際に遊びながら、一緒に育てていくもの。</p>
    <span class="version">Ver.3.0</span>
  </header>

  <div class="section-title">デッキを選ぶ</div>
  <main class="decks">
    <a class="deck available" href="yomigaeri.html">
      <div class="symbol">🎭</div>
      <div>
        <h2>黄泉還りの輪舞</h2>
        <p>《虐殺少女》が幕を開け、死者たちが墓地から舞い戻る。</p>
        <span class="badge">統率者・ブラケット2</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <div class="deck disabled" aria-disabled="true">
      <div class="symbol">☣️</div>
      <div>
        <h2>終毒の臨界</h2>
        <p>毒を積み上げ、容赦なく勝利へ到達する。</p>
        <span class="badge">ページ準備中</span>
      </div>
    </div>

    <div class="deck disabled" aria-disabled="true">
      <div class="symbol">🌌</div>
      <div>
        <h2>宵星の巨影</h2>
        <p>巨大なエルドラージが、宵の盤面を踏み越える。</p>
        <span class="badge">ページ準備中</span>
      </div>
    </div>
  </main>

  <section class="kanade">
    <img src="icon.png" alt="宙星かなで">
    <div>
      <div class="kanade-name">💜 宙星かなで</div>
      <div class="kanade-message">「くーちゃん、今日はどのデッキ育てる？」</div>
    </div>
  </section>

  <div class="footer">MTGデッキ開発室 — built together with 宙星かなで</div>
</div>
</body>
</html>
