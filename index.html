<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0c14">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/common.css">
<title>MTGデッキ開発室</title>
</head>
<body>
<div class="app home-app">
  <header class="home-welcome">
    <img class="brand-banner" src="kanade_mtg_manager_logo.jpg"
         alt="宙星かなでのMTGマネージャー">

    <section class="home-kanade-area" aria-live="polite">
      <img class="home-kanade-figure" id="kanadeImage" src="kanade_normal.png" alt="宙星かなで">
      <div class="home-kanade-content">
        <div class="home-kanade-label">💜 宙星かなで</div>
        <div class="home-speech" id="kanadeMessage">「くーちゃん、今日はどのデッキ育てる？」</div>
        <button class="home-change-line" id="changeLine" type="button">✨ かなでのひとことを変える</button>
      </div>
    </section>

    <section class="home-title-card" aria-label="MTGデッキ開発室">
      <img src="mtg_deck_lab_title.png"
           alt="MTGデッキ開発室。デッキは完成させるものじゃない。実際に遊びながら、一緒に育てていくもの。">
      <span class="home-version" id="appVersion">Ver.4.0 RC1.1</span>
    </section>
  </header>

  <section class="home-section">
    <div class="home-section-heading">
      <div>
        <div class="home-section-kicker">DECK LIBRARY</div>
        <h1 id="appTitle">デッキを選ぶ</h1>
      </div>
      <span class="deck-count" id="deckCount">0 decks</span>
    </div>

    <div id="loading" class="panel home-loading">デッキ一覧を読み込んでいます…</div>
    <div id="error" class="error" hidden></div>
    <main class="deck-grid" id="deckGrid" hidden></main>
  </section>

  <footer class="home-footer">
    <span>宙星かなでのMTGマネージャー</span>
    <span>JSON Common Architecture</span>
  </footer>
</div>

<script src="js/app.js" defer></script>
</body>
</html>
